# Colcon defaults for crypto_ws workspace
# Separate build configuration to avoid interference with ros_ws
build:
  symlink-install: true
  cmake-args:
    - "-DCMAKE_BUILD_TYPE=Release"
    - "-DBUILD_TESTING=OFF"
  base-paths:
    - "/home/zozo/crypto_ws/crypto_prediction/src"
  build-base: "/home/zozo/.crypto_builds/build"
  install-base: "/home/zozo/.crypto_builds/install"
  log-base: "/home/zozo/.crypto_builds/log"

test:
  base-paths:
    - "/home/zozo/crypto_ws/crypto_prediction/src"
  build-base: "/home/zozo/.crypto_builds/build"
  install-base: "/home/zozo/.crypto_builds/install"
  log-base: "/home/zozo/.crypto_builds/log"

