services:
  # Base AI/ML development image build service
  base-dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.base
      # Note: cache_from removed to avoid error when image doesn't exist yet
    image: robotics-dev-base:latest
    profiles: ["build"]

  # ROS2 Jazzy development service
  ros2-jazzy:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.ai
      args:
        - ROS_DISTRO=jazzy
      cache_from:
        - robotics-dev-base:latest
    image: robotics-dev:jazzy
    container_name: ros2-jazzy-dev
    hostname: ros2-jazzy
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "source /opt/ros/jazzy/setup.bash && ros2 doctor --report | grep -q 'RMW MIDDLEWARE'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # GPU Configuration
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility, graphics]
    
    # Environment
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=1
      - ROS_DISTRO=jazzy
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - QT_X11_NO_MITSHM=1
      - PYTHONDONTWRITEBYTECODE=1
      - CARB_AUDIO_DISABLE=1
      - XDG_RUNTIME_DIR=/tmp/runtime-zozo
    
    # Volumes
    volumes:
      # Workspace
      - .:/home/zozo/zobot_ws:rw
      
      # Cave storage
      - /mnt/cave:/home/zozo/cave:rw
      
      # SSH keys (read-only)
      - ${HOME}/.ssh:/home/zozo/.ssh:ro
      
      # X11 for GUI apps
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      
      # XDG Runtime directory
      - ${XDG_RUNTIME_DIR:-/tmp/runtime-${UID:-1000}}:/tmp/runtime-zozo:rw
      
      # Device access
      - /dev:/dev:rw
      - /run/udev:/run/udev:ro
      
      # System files for user mapping
      - /etc/group:/etc/group:ro
      - /etc/passwd:/etc/passwd:ro
      
      # Conda environments (persistent across container rebuilds)
      - /mnt/cave/.conda_docker:/home/zozo/.conda:rw
      
      # Wandb API key (if exists)
      - ${HOME}/.netrc:/home/zozo/.netrc:rw
      
      # Hugging Face tokens (if exists)
      - ${HOME}/.cache/huggingface:/home/zozo/.cache/huggingface:rw
    
    # Devices
    devices:
      - /dev/dri:/dev/dri
    
    # Network and IPC
    network_mode: host
    ipc: host
    privileged: true
    
    # User
    user: "1000:1000"
    working_dir: /home/zozo/zobot_ws
    
    # Keep container running
    command: tail -f /dev/null
    
    profiles: ["jazzy"]
